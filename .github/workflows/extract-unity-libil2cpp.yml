name: Extract Unity libil2cpp

on:
  workflow_dispatch:
    inputs:
      unity_version:
        description: "Unity version (for example: 2021.3.40f1)"
        required: true
        type: string
      force:
        description: "Force overwrite if target directory exists"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: repo-write-queue-extract-unity-libil2cpp
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    env:
      UNITY_VERSION: ${{ github.event.inputs.unity_version }}
      FORCE: ${{ github.event.inputs.force }}
      UNITY_IMAGE: unityci/editor:ubuntu-${{ github.event.inputs.unity_version }}-linux-il2cpp-3
      MIN_FREE_GB: 25

    steps:
      - uses: actions/checkout@v4

      - name: Check available disk space
        id: disk_check
        shell: bash
        run: |
          set -euo pipefail
          free_kb="$(df -Pk / | awk 'NR==2 {print $4}')"
          free_gb="$((free_kb / 1024 / 1024))"
          echo "Current free disk space: ${free_gb} GB"

          if (( free_gb < MIN_FREE_GB )); then
            echo "need_cleanup=true" >> "$GITHUB_OUTPUT"
            echo "free_gb=${free_gb}" >> "$GITHUB_OUTPUT"
            echo "Free space is below ${MIN_FREE_GB} GB, running cleanup step."
          else
            echo "need_cleanup=false" >> "$GITHUB_OUTPUT"
            echo "free_gb=${free_gb}" >> "$GITHUB_OUTPUT"
            echo "Free space is sufficient, skipping cleanup step."
          fi

      - name: Free up disk space
        if: steps.disk_check.outputs.need_cleanup == 'true'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: true
          dotnet: true
          docker-images: true

      - name: Validate input
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${UNITY_VERSION}" ]]; then
            echo "unity_version is required"
            exit 1
          fi
          if [[ "${UNITY_VERSION}" == *"/"* ]]; then
            echo "unity_version must not contain '/'"
            exit 1
          fi

      - name: Skip when target folder exists
        id: precheck
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d "${UNITY_VERSION}" && "${FORCE}" != "true" ]]; then
            echo "Target folder '${UNITY_VERSION}' already exists. Skip extraction."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            if [[ -d "${UNITY_VERSION}" && "${FORCE}" == "true" ]]; then
              echo "Target folder '${UNITY_VERSION}' exists, but force=true so it will be overwritten."
            fi
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Unity files
        if: steps.precheck.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -e UNITY_VERSION -e FORCE -v "${GITHUB_WORKSPACE}:/repo" "${UNITY_IMAGE}" /bin/bash "/repo/scripts/extract-unity-libil2cpp.sh"

      - name: Commit and push
        if: steps.precheck.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${UNITY_VERSION}"
          if git diff --cached --quiet; then
            echo "No file changes detected."
            exit 0
          fi

          git commit -m "Add Unity ${UNITY_VERSION} extracted files"

          branch="${GITHUB_REF_NAME}"
          max_retries=5
          retry_delay=3

          for attempt in $(seq 1 "${max_retries}"); do
            echo "Push attempt ${attempt}/${max_retries}"

            git fetch origin "${branch}"
            if ! git rebase "origin/${branch}"; then
              git rebase --abort || true
              echo "Rebase failed due to conflicts. Manual resolution is required."
              exit 1
            fi

            if git push origin "HEAD:${branch}"; then
              echo "Push succeeded."
              exit 0
            fi

            if (( attempt == max_retries )); then
              echo "Push failed after ${max_retries} attempts."
              exit 1
            fi

            echo "Push conflict detected. Retrying in ${retry_delay}s..."
            sleep "${retry_delay}"
          done
