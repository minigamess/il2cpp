name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      unity_version:
        description: "Unity version (for example: 2021.3.40f1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build Android APK
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: UnityProj
          unityVersion: ${{ inputs.unity_version }}
          targetPlatform: Android
          buildMethod: Editor.BuildCli.PerformBuild

      - name: Verify APK output exists
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          apk_files=(UnityProj/Builds/*.apk)
          if (( ${#apk_files[@]} == 0 )); then
            echo "No APK was generated under UnityProj/Builds."
            echo "Current UnityProj/Builds contents:"
            if [[ -d UnityProj/Builds ]]; then
              ls -R UnityProj/Builds
            else
              echo "UnityProj/Builds directory does not exist."
            fi
            exit 1
          fi

          echo "Found APK(s):"
          printf ' - %s\n' "${apk_files[@]}"

      - name: Upload Android build outputs
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ inputs.unity_version }}
          path: |
            UnityProj/Builds/*.apk
            UnityProj/Builds/**/*symbols*.zip
            UnityProj/Builds/**/symbols.zip
            UnityProj/Builds/**/*.symbols
            UnityProj/Builds/**/*.sym
          if-no-files-found: error
